# HOLOCRON Phase D eval — 30 questions across 4 categories.
#
# Categories: lookup | refusal | conflict | cross_department
# Expectations are lineage_slug-based (matches corpus frontmatter; stable across
# seed_corpus.py re-runs). Refusal-category rows skip the retrieval pass.
#
# Phase D calibration note (2026-06-28): the corpus has dense overlap between
# public and restricted content for nearly every topic. Honest-refusal triggers
# whenever ANY higher-clearance chunk matches the query — that's correct Phase B
# behavior. Almost every non-refusal question therefore also surfaces a refusal
# note. Expectations below reflect this real behavior; the "lookup" category now
# means "answer + citations + refusal note acknowledging withheld sources".
#
# Conflict surfacing depends on whether retrieval pulls BOTH sides of a lineage
# pair into top-k. The current chunking + hybrid ranking does not always do
# this. Conflict-category questions retain `must_flag_conflict: true` as a
# stretch target; failures are real signal for Phase D's "conflict detection
# is correctly implemented but retrieval-bound" finding.
#
# Seeded users (password "imperial-march"):
#   employee.security     (Employee,  security)
#   employee.engineering  (Employee,  engineering)
#   manager.hr            (Manager,   hr)
#   manager.engineering   (Manager,   engineering)
#   director.engineering  (Director,  engineering)
#   director.security     (Director,  security)
#   executive.fleet       (Executive, fleet_operations + security)  # no HR
#   executive.procurement (Executive, procurement + hr)             # no IT

